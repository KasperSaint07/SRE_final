global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s

  external_labels:
    cluster: "sre-final"
    environment: "production"

# ── Alertmanager ─────────────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# ── Alert rules ───────────────────────────────────────────────────────────────
rule_files:
  - /etc/prometheus/alert-rules.yml

# ── Scrape configs ────────────────────────────────────────────────────────────
scrape_configs:

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
    metrics_path: /metrics

  # FastAPI application
  - job_name: "fastapi-app"
    static_configs:
      - targets: ["fastapi-app:8000"]
    metrics_path: /metrics
    scrape_interval: 15s
    scheme: http
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: "fastapi-app"

  # Alertmanager
  - job_name: "alertmanager"
    static_configs:
      - targets: ["alertmanager:9093"]
    metrics_path: /metrics
